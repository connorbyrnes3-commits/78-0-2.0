<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>78-0 Draft Battle - Multiplayer</title>
<style>
:root{
  --bg:#07101f;
  --panel:#101a33;
  --panel2:#0c1428;
  --line:#243255;
  --gold:#ffd24a;
  --text:#f4f7ff;
  --muted:#aab5d6;
  --good:#69f0ae;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#07101f,#0b1630 60%,#07101f);
  color:var(--text);
  overflow-x:hidden;
}
.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
  position:relative;
  z-index:1;
}
h1{
  margin:0 0 8px;
  font-size:64px;
  letter-spacing:.08em;
  text-align:center;
  font-weight:900;
}
.grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:16px;
}
.card{
  background:rgba(16,26,51,.95);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  position:relative;
  overflow:hidden;
}
.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
button{
  border:0;
  border-radius:12px;
  padding:11px 14px;
  font-weight:700;
  cursor:pointer;
}
.primary{
  background:var(--gold);
  color:#111;
}
.secondary{
  background:#15213d;
  color:var(--text);
  border:1px solid var(--line);
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#1b2745;
  color:var(--muted);
  margin:4px 6px 0 0;
  font-size:13px;
}
.small{
  color:var(--muted);
  font-size:14px;
}
.hidden{display:none}
.list button{
  width:100%;
  text-align:left;
  margin:6px 0;
  background:#15213d;
  color:var(--text);
  border:1px solid var(--line);
}
.lobbyCard{
  background:rgba(16,26,51,.95);
  border:1px solid var(--line);
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  max-width:500px;
  margin:60px auto;
  text-align:center;
}
.lobbyCard h2{
  margin-top:0;
  margin-bottom:20px;
}
.lobbyCard input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#0b1325;
  color:var(--text);
  font-size:14px;
}
.lobbyCard input::placeholder{
  color:var(--muted);
}
.roomCode{
  font-size:32px;
  font-weight:900;
  color:var(--gold);
  margin:20px 0;
  letter-spacing:4px;
}
.roomCodeLabel{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:2px;
}
.slotWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
.slot{
  background:#0b1325;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  text-align:center;
  overflow:hidden;
  position:relative;
}
.slotLabel{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.reel{
  height:64px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:900;
  line-height:1;
  border-radius:10px;
  background:linear-gradient(180deg,#15213d,#101a33);
  position:relative;
  transform:translateZ(0);
}
.reel.spinning{
  animation:reelPulse .18s linear infinite, reelGlow .5s ease-in-out infinite alternate;
}
.reel.spinning::after{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:12px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  animation:sheen .8s linear infinite;
  pointer-events:none;
}
.flash{margin-top:12px;color:#fff}
.spinCard{position:relative}
.spinCard.shake{animation:shake .55s cubic-bezier(.36,.07,.19,.97) both}
.turnIndicator{
  padding:12px;
  background:rgba(255,210,74,.1);
  border:1px solid var(--gold);
  border-radius:8px;
  margin-bottom:12px;
  color:var(--gold);
  font-weight:700;
}
.turnIndicator.p2{
  background:rgba(255,125,209,.1);
  border-color:#ff7bd1;
  color:#ff7bd1;
}
.waiting{
  padding:12px;
  background:rgba(106,240,174,.1);
  border:1px solid var(--good);
  border-radius:8px;
  color:var(--good);
  font-weight:700;
  text-align:center;
}
.finalOverlay{
  position:fixed;
  inset:0;
  background:rgba(4,9,22,.92);
  backdrop-filter:blur(2px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  opacity:0;
  pointer-events:none;
  transition:opacity .7s ease;
}
.finalOverlay.show{
  opacity:1;
  pointer-events:auto;
}
.finalPanel{
  width:min(560px,92vw);
  background:linear-gradient(180deg,rgba(16,26,51,.98),rgba(10,18,38,.98));
  border:1px solid var(--line);
  border-radius:28px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  position:relative;
  overflow:hidden;
  max-height:90vh;
  overflow-y:auto;
}
.finalPanel::before{
  content:'';
  position:absolute;
  inset:-30%;
  background:radial-gradient(circle at top,rgba(255,210,74,.14),transparent 50%);
  pointer-events:none;
}
.confettiLayer{
  position:fixed;
  inset:0;
  z-index:25;
  pointer-events:none;
  overflow:hidden;
  opacity:0;
  transition:opacity .8s ease;
}
.confettiLayer.show{opacity:1}
.confetti{
  position:absolute;
  top:-12px;
  width:10px;
  height:18px;
  border-radius:2px;
  animation:fall linear forwards;
  will-change:transform,opacity;
}
.finalCompare{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}
.finalPlayer{
  background:rgba(12,20,40,.9);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  position:relative;
}
.finalPlayer.winner{
  border-color:var(--gold);
  box-shadow:0 0 12px rgba(255,210,74,.2);
}
.finalPlayerName{
  font-weight:800;
  font-size:16px;
  margin-bottom:12px;
  color:var(--gold);
}
.finalPlayerDraft{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:12px;
}
.finalDraftItem{
  background:rgba(7,16,31,.8);
  border:1px solid #223055;
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
}
.finalDraftName{
  font-weight:700;
}
.finalDraftMeta{
  color:var(--muted);
  font-size:11px;
}
.finalScore{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid #223055;
  padding-top:12px;
}
.finalScoreLabel{
  font-size:12px;
  color:var(--muted);
}
.finalScoreNum{
  font-size:28px;
  font-weight:900;
  color:var(--gold);
}
.winnerBanner{
  text-align:center;
  padding:16px;
  background:rgba(255,210,74,.1);
  border:1px solid var(--gold);
  border-radius:12px;
  margin-bottom:16px;
  color:var(--gold);
  font-weight:800;
  font-size:18px;
}
.saveRow{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:2px;
}
.p1Board{color:#7ec8ff}
.p2Board{color:#ff7bd1}
.connectionStatus{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:8px 12px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
}
.connectionStatus.connected{
  background:#69f0ae;
  color:#07101f;
}
.connectionStatus.disconnected{
  background:#ff6b6b;
  color:#fff;
}
@media (max-width:900px){
  .grid{grid-template-columns:1fr}
  .slotWrap{grid-template-columns:1fr}
  .finalCompare{grid-template-columns:1fr}
}
@keyframes shake{
  10%,90%{transform:translate3d(-1px,0,0)}
  20%,80%{transform:translate3d(2px,0,0)}
  30%,50%,70%{transform:translate3d(-4px,0,0)}
  40%,60%{transform:translate3d(4px,0,0)}
}
@keyframes reelPulse{
  0%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-1px) scale(1.01)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes reelGlow{
  from{filter:brightness(1)}
  to{filter:brightness(1.2)}
}
@keyframes sheen{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}
@keyframes fall{
  0%{transform:translate3d(var(--x,0),-20px,0) rotate(0deg);opacity:1}
  100%{transform:translate3d(calc(var(--x,0) + var(--drift,0px)),110vh,0) rotate(720deg);opacity:0}
}
</style>

</head>

      <div id="poolBox" class="card hidden" style="margin-top:14px;background:var(--panel2)"></div>
    </div>

    <div class="card">

      <div id="p1Board" class="p1Board" style="margin-bottom:16px">

      <div id="p2Board" class="p2Board">

        <div id="p2Picks" class="small">No picks yet.</div>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="revealCard" class="finalOverlay hidden">
    <div class="finalPanel" id="finalCapture">
      <div class="winnerBanner" id="winnerBanner"></div>
      <div class="finalCompare" id="finalCompare"></div>
      <div class="saveRow">

        <button type="button" class="primary" data-action="backToLobby">New Game</button>
      </div>
    </div>
  </div>
</div>

const el = id => document.getElementById(id);
const confettiLayer = el('confettiLayer');
const seasons = ['fall','spring'];
const years = [2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];

function shuffle(arr){ return arr.map(v => ({v, r: Math.random()})).sort((a,b) => a.r - b.r).map(x => x.v); }
function grade(o){
  if(o>=96)return'A+';if(o>=93)return'A';if(o>=90)return'A-';if(o>=87)return'B+';if(o>=83)return'B';if(o>=80)return'B-';if(o>=77)return'C+';if(o>=73)return'C';if(o>=70)return'C-';if(o>=67)return'D+';if(o>=63)return'D';if(o>=60)return'D-';return'F';
}
function record(sum){if(sum>=370)return'78-0';const diff=370-sum;const losses=Math.ceil(diff/2);const wins=78-losses;return`${wins}-${losses}`;}
function genRoomCode(){return Math.random().toString(36).substring(2, 8).toUpperCase();}
function updateConnectionStatus(connected){el('connectionStatus').className='connectionStatus '+(connected?'connected':'disconnected');el('connectionStatus').textContent=(connected?'●':'●')+' '+(connected?'Connected':'Disconnected');}

function showSection(section){
  document.querySelectorAll('[id$="Section"]').forEach(s => s.classList.add('hidden'));
  el(section + 'Section').classList.remove('hidden');
}

function showCreateScreen(){
  showSection('create');
}

function showJoinScreen(){
  showSection('join');
}

function backToLobby(){
  el('lobbyScreen').classList.remove('hidden');
  el('gameScreen').classList.add('hidden');
  el('revealCard').classList.add('hidden');
  showSection('');
  roomCode = '';
  myPlayerId = '';
}

async function createGame(){
  const name = el('createName').value.trim();
  if(!name) return alert('Enter your name');
  playerName = name;
  
  roomCode = genRoomCode();
  myPlayerNum = 1;
  
  const gameData = {
    p1: {name, id: Math.random().toString(36).substring(7)},
    p2: null,
    order: shuffle(['fall','spring','fall','spring']),
    available: roster.map(r => r.name),
    picks: [{}, {}],
    currentPlayer: 1,
    status: 'waiting',
    respinUsed: [[false, false], [false, false]]
  };
  
  myPlayerId = gameData.p1.id;
  
  await db.ref('rooms/' + roomCode).set(gameData);
  
  el('displayRoomCode').textContent = roomCode;
  showSection('waiting');
  
  // Wait for opponent
  db.ref('rooms/' + roomCode + '/p2').on('value', snap => {
    if(snap.val()) {
      el('lobbyScreen').classList.add('hidden');
      el('gameScreen').classList.remove('hidden');
      startGameMultiplayer();
    }
  });
}

async function joinGame(){
  const name = el('playerName').value.trim();
  const code = el('roomCode').value.toUpperCase();
  if(!name) return alert('Enter your name');
  if(!code) return alert('Enter room code');
  
  playerName = name;
  roomCode = code;
  myPlayerNum = 2;
  myPlayerId = Math.random().toString(36).substring(7);
  
  try {
    const snap = await db.ref('rooms/' + code).once('value');
    if(!snap.exists()) return alert('Room not found');
    
    await db.ref('rooms/' + code + '/p2').set({name, id: myPlayerId});
    
    el('lobbyScreen').classList.add('hidden');
    el('gameScreen').classList.remove('hidden');
    startGameMultiplayer();
  } catch(e) {
    alert('Error joining room: ' + e.message);
  }
}

function startGameMultiplayer(){
  const gameRef = db.ref('rooms/' + roomCode);
  
  gameRef.on('value', snap => {
    gameState = snap.val();
    if(gameState && gameState.status === 'finished') {
      showResults();
    } else {
      updateUIMultiplayer();
    }
  });
}

function updateUIMultiplayer(){
  if(!gameState) return;
  
  const totalPicks = Object.keys(gameState.picks[0]).length + Object.keys(gameState.picks[1]).length;
  const isMyTurn = gameState.currentPlayer === myPlayerNum;
  
  el('pickNum').textContent = totalPicks + 1;
  el('turnIndicator').className = 'turnIndicator ' + (isMyTurn ? '' : 'p2');
  el('turnIndicator').innerHTML = (isMyTurn ? '✓ Your Turn' : '⏳ Opponent\'s Turn') + ' - Pick #<span id="pickNum">' + (totalPicks + 1) + '</span>';
  el('opponentWaitingMsg').classList.toggle('hidden', isMyTurn);
  el('spinBtn').disabled = !isMyTurn;
  
  const p1Name = gameState.p1.name;
  const p2Name = gameState.p2.name;
  const p1Picks = Object.values(gameState.picks[0]);
  const p2Picks = Object.values(gameState.picks[1]);
  
  el('p1Label').textContent = `${p1Name} (${p1Picks.length}/4)`;
  el('p2Label').textContent = `${p2Name} (${p2Picks.length}/4)`;
  
  el('p1Picks').innerHTML = p1Picks.length === 0 ? 'No picks yet.' : p1Picks.map((p,i) => `<div class="badge">${i+1}. ${p.name} — ${p.year} ${p.sem}</div>`).join(' ');
  el('p2Picks').innerHTML = p2Picks.length === 0 ? 'No picks yet.' : p2Picks.map((p,i) => `<div class="badge">${i+1}. ${p.name} — ${p.year} ${p.sem}</div>`).join(' ');
}

async function spinWheelMultiplayer(){
  if(!gameState || gameState.currentPlayer !== myPlayerNum) return;
  el('spinBtn').disabled = true;
  
  const totalPicks = Object.keys(gameState.picks[0]).length + Object.keys(gameState.picks[1]).length;
  const neededSem = gameState.order[totalPicks];
  const validYears = getValidYears(neededSem);
  
  if(!validYears.length) return;
  
  const selectedYear = validYears[Math.floor(Math.random() * validYears.length)];
  
  await db.ref('rooms/' + roomCode + '/currentSpin').set({
    year: selectedYear,
    sem: neededSem,
    spinning: true
  });
}

function getValidYears(sem){
  return [...new Set(
    gameState.available
      .map(name => roster.find(r => r.name === name))
      .filter(p => p && p.sem === sem)
      .map(p => p.year)
  )].filter(y => !(y === 2020 && sem === 'spring')).sort((a,b)=>a-b);
}

async function pickPlayerMultiplayer(playerName){
  if(!gameState || gameState.currentPlayer !== myPlayerNum) return;
  
  const playerIdx = myPlayerNum - 1;
  const pickKey = 'pick' + (Object.keys(gameState.picks[playerIdx]).length + 1);
  const player = roster.find(r => r.name === playerName);
  
  const updates = {};
  updates['rooms/' + roomCode + '/picks/' + playerIdx + '/' + pickKey] = player;
  updates['rooms/' + roomCode + '/available'] = gameState.available.filter(n => n !== playerName);
  
  const p1Total = Object.values(gameState.picks[0]).reduce((a,p) => a + p.ovr, 0) + (playerIdx === 0 ? player.ovr : 0);
  const p2Total = Object.values(gameState.picks[1]).reduce((a,p) => a + p.ovr, 0) + (playerIdx === 1 ? player.ovr : 0);
  
  if(Object.keys(gameState.picks[0]).length + Object.keys(gameState.picks[1]).length === 7) {
    updates['rooms/' + roomCode + '/status'] = 'finished';
    updates['rooms/' + roomCode + '/finalScores'] = {p1: p1Total, p2: p2Total};
  } else {
    updates['rooms/' + roomCode + '/currentPlayer'] = gameState.currentPlayer === 1 ? 2 : 1;
  }
  
  updates['rooms/' + roomCode + '/wheelBox'] = null;
  updates['rooms/' + roomCode + '/poolBox'] = null;
  
  await db.ref().update(updates);
}

function showResults(){
  el('gameScreen').classList.add('hidden');
  el('revealCard').classList.remove('hidden');
  el('revealCard').classList.add('show');
  
  const p1Picks = Object.values(gameState.picks[0]);
  const p2Picks = Object.values(gameState.picks[1]);
  const p1Total = gameState.finalScores.p1;
  const p2Total = gameState.finalScores.p2;
  
  let winner = '';
  if(p1Total > p2Total) winner = gameState.p1.name;
  else if(p2Total > p1Total) winner = gameState.p2.name;
  else winner = 'Tie';
  
  el('winnerBanner').innerHTML = winner === 'Tie' ? '🏆 It\'s a Tie! 🏆' : `🏆 ${winner} Wins! 🏆`;
  
  el('finalCompare').innerHTML = `
    <div class="finalPlayer ${p1Total > p2Total ? 'winner' : ''}">
      <div class="finalPlayerName">${gameState.p1.name}</div>
      <div class="finalPlayerDraft">
        ${p1Picks.map((p,i) => `<div class="finalDraftItem"><div class="finalDraftName">${i+1}. ${p.name}</div><div class="finalDraftMeta">${p.year} ${p.sem} • ${grade(p.ovr)}</div></div>`).join('')}
      </div>
      <div class="finalScore">
        <div class="finalScoreLabel">Total</div>
        <div class="finalScoreNum">${p1Total}</div>
      </div>
    </div>
    <div class="finalPlayer ${p2Total > p1Total ? 'winner' : ''}">
      <div class="finalPlayerName">${gameState.p2.name}</div>
      <div class="finalPlayerDraft">
        ${p2Picks.map((p,i) => `<div class="finalDraftItem"><div class="finalDraftName">${i+1}. ${p.name}</div><div class="finalDraftMeta">${p.year} ${p.sem} • ${grade(p.ovr)}</div></div>`).join('')}
      </div>
      <div class="finalScore">
        <div class="finalScoreLabel">Total</div>
        <div class="finalScoreNum">${p2Total}</div>
      </div>
    </div>
  `;
  
  fireConfetti();
}

function fireConfetti(){
  confettiLayer.innerHTML = '';
  const colors = ['#ffd24a','#69f0ae','#7ec8ff','#ff7bd1','#ffffff'];
  for(let i=0;i<140;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.setProperty('--x', (Math.random()*8 - 4) + 'vw');
    c.style.setProperty('--drift', (Math.random()*20 - 10) + 'vw');
    c.style.animationDuration = (2.7 + Math.random()*1.7) + 's';
    c.style.animationDelay = (Math.random()*0.5) + 's';
    c.style.opacity = (0.8 + Math.random()*0.2).toFixed(2);
    confettiLayer.appendChild(c);
  }
  confettiLayer.classList.add('show');
  setTimeout(() => {
    confettiLayer.classList.remove('show');
    setTimeout(() => { confettiLayer.innerHTML = ''; }, 900);
  }, 3500);
}

function saveImage(){
  const target = document.querySelector('.finalPanel');
  if(!target || typeof html2canvas === 'undefined') return;
  html2canvas(target, {backgroundColor:null, scale:2, useCORS:true}).then(canvas => {
    canvas.toBlob(blob => {
      if(!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '78-0-draft-battle.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    });
  });
}

document.body.addEventListener('click', (e) => {
  const a = e.target.closest('[data-action]');
  if(!a) return;
  const act = a.dataset.action;
  if(act === 'showCreate') showCreateScreen();
  if(act === 'showJoin') showJoinScreen();
  if(act === 'createGame') createGame();
  if(act === 'joinGame') joinGame();
  if(act === 'backToLobby') backToLobby();
  if(act === 'spin') spinWheelMultiplayer();
  if(act === 'pick') pickPlayerMultiplayer(a.dataset.player);
  if(act === 'saveImage') saveImage();
});
</script>
